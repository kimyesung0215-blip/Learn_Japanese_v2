    return raw === null ? fallback : JSON.parse(raw);
  } catch (e) { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); } catch (e) {}
}
function removeLS(key) {
  try { localStorage.removeItem(LS_PREFIX + key); } catch (e) {}
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n, excludeIdx = -1) {
  const pool = arr.map((v, i) => i).filter(i => i !== excludeIdx);
  return shuffle(pool).slice(0, n).map(i => arr[i]);
}
// 날짜 기반 "오늘의 단어" 20개 (루프 방식: 끝에 닿으면 처음으로 순환)
function todaysWords() {
  const dayNum = Math.floor(Date.now() / 86400000); // UTC 기준 일 수
  const size = 20;
  const start = (dayNum * size) % WORDS.length;
  const out = [];
  for (let i = 0; i < size; i++) out.push(WORDS[(start + i) % WORDS.length]);
  return out;
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// 글자 수에 따라 폰트 크기를 줄여 줄바꿈 방지 (startLen 초과 시 비례 축소)
function fz(text, base, min, startLen) {
  const len = (text || '').length;
  if (len <= startLen) return base;
  return Math.max(min, Math.round(base * startLen / len));
}

/* ── 가나 → 로마자 발음 변환 (헵번식 기반, 교과서 표기) ──
   규칙: っ은 다음 자음 겹치기(ち 앞은 t), ん은 n,
   장음 ー은 모음 반복, 조사 は는 wa / へ는 e */
const KANA2ROMA = {
  'あ':'a','い':'i','う':'u','え':'e','お':'o',
  'か':'ka','き':'ki','く':'ku','け':'ke','こ':'ko',
  'さ':'sa','し':'shi','す':'su','せ':'se','そ':'so',
  'た':'ta','ち':'chi','つ':'tsu','て':'te','と':'to',
  'な':'na','に':'ni','ぬ':'nu','ね':'ne','の':'no',
  'は':'ha','ひ':'hi','ふ':'fu','へ':'he','ほ':'ho',
  'ま':'ma','み':'mi','む':'mu','め':'me','も':'mo',
  'や':'ya','ゆ':'yu','よ':'yo',
  'ら':'ra','り':'ri','る':'ru','れ':'re','ろ':'ro',
  'わ':'wa','を':'o',
  'が':'ga','ぎ':'gi','ぐ':'gu','げ':'ge','ご':'go',
  'ざ':'za','じ':'ji','ず':'zu','ぜ':'ze','ぞ':'zo',
  'だ':'da','ぢ':'ji','づ':'zu','で':'de','ど':'do',
  'ば':'ba','び':'bi','ぶ':'bu','べ':'be','ぼ':'bo',
  'ぱ':'pa','ぴ':'pi','ぷ':'pu','ぺ':'pe','ぽ':'po',
  'ぁ':'a','ぃ':'i','ぅ':'u','ぇ':'e','ぉ':'o',
  'きゃ':'kya','きゅ':'kyu','きょ':'kyo',
  'しゃ':'sha','しゅ':'shu','しょ':'sho',
  'ちゃ':'cha','ちゅ':'chu','ちょ':'cho',
  'にゃ':'nya','にゅ':'nyu','にょ':'nyo',
  'ひゃ':'hya','ひゅ':'hyu','ひょ':'hyo',
  'みゃ':'mya','みゅ':'myu','みょ':'myo',
  'りゃ':'rya','りゅ':'ryu','りょ':'ryo',
  'ぎゃ':'gya','ぎゅ':'gyu','ぎょ':'gyo',
  'じゃ':'ja','じゅ':'ju','じょ':'jo',
  'びゃ':'bya','びゅ':'byu','びょ':'byo',
  'ぴゃ':'pya','ぴゅ':'pyu','ぴょ':'pyo',
};
function nextKanaRomaji(s, i) {
  const ch = s[i];
  if (!ch) return null;
  const nx = s[i+1];
  if (nx && 'ゃゅょ'.includes(nx)) return KANA2ROMA[ch + nx] || null;
  return KANA2ROMA[ch] || null;
}
function kanaToRomaji(text) {
  if (!text) return '';
  // 괄호 안 보조 표기 제거 + 가타카나 → 히라가나 (장음 ー 유지)
  let s = '';
  for (const ch of String(text).replace(/\([^)]*\)/g, '')) {
    const c = ch.codePointAt(0);
    s += (c >= 0x30A1 && c <= 0x30F6) ? String.fromCodePoint(c - 0x60) : ch;
  }
  let out = '';
  const lastVowel = () => {
    const m = out.match(/[aiueo](?=[^aiueo]*$)/);
    return m ? m[0] : null;
  };
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === 'っ') {                                  // 촉음 → 다음 자음 겹치기
      const nr = nextKanaRomaji(s, i + 1);
      if (nr) out += nr.startsWith('ch') ? 't' : nr[0];
      continue;
    }
    if (ch === 'ん') { out += 'n'; continue; }           // 발음
    if (ch === 'ー') {                                   // 장음 → 모음 반복
      const v = lastVowel();
      if (v) out += v;
      continue;
    }
    const isEnd = i === s.length - 1 || ' 、。!?'.includes(s[i+1] || '');
    if (ch === 'は' && isEnd) { out += 'wa'; continue; } // 조사 は = wa
    if (ch === 'へ' && isEnd) { out += 'e'; continue; }  // 조사 へ = e
    let key = ch;
    const nx = s[i+1];
    if (nx && 'ゃゅょ'.includes(nx)) { key = ch + nx; i++; }
    const r = KANA2ROMA[key];
    if (r) out += r;
    else if (ch === '・' || ch === ' ' || ch === '　') out += ' ';
    else if ('→↔/'.includes(ch)) out += ' ' + ch + ' ';
  }
  return out.replace(/\s+/g, ' ').trim();
}

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function calcStreak() {
  const a = new Set(loadLS('activity', []));
  let n = 0;
  const d = new Date();
  if (!a.has(fmtDate(d))) d.setDate(d.getDate() - 1); // 오늘 아직 안 했으면 어제부터
  while (a.has(fmtDate(d))) { n++; d.setDate(d.getDate() - 1); }
  return n;
}
function maxStreak() {
  const ds = [...new Set(loadLS('activity', []))].sort();
  let best = 0, cur = 0, prev = null;
  for (const s of ds) {
    const d = new Date(s + 'T00:00:00');
    cur = (prev && d - prev === 86400000) ? cur + 1 : 1;
    best = Math.max(best, cur);
    prev = d;
  }
  return best;
}

/* 범용 4지선다(또는 N지선다) 퀴즈 엔진
   questions: [{prompt, promptSub?, answer, choices:[...]}]  */
function QuizRunner({ questions, theme, onFinish, jpPrompt }) {
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);   // 선택한 choice 텍스트
  const [wrongList, setWrongList] = useState([]);
  const [score, setScore] = useState(0);
  const lockRef = useRef(false);
  const q = questions[idx];

  const pick = (choice) => {
    if (lockRef.current) return;
    lockRef.current = true;
    setPicked(choice);
    const correct = choice === q.answer;
    if (correct) setScore(s => s + 1);
    else setWrongList(w => [...w, q]);
    setTimeout(() => {
      lockRef.current = false;
      setPicked(null);
      if (idx + 1 >= questions.length) {
        onFinish({ score: correct ? score + 1 : score, total: questions.length,
                   wrong: correct ? wrongList : [...wrongList, q] });
      } else {
        setIdx(i => i + 1);
      }
    }, 750);
  };

  return (
    <div className="fade-up">
      <div style={{display:'flex', justifyContent:'space-between', fontSize:13, opacity:0.7, marginBottom:8}}>
        <span>{idx + 1} / {questions.length}</span>
        <span>정답 {score}</span>
      </div>
      <div style={{height:4, borderRadius:2, background:C.panel, marginBottom:20}}>
        <div style={{height:4, borderRadius:2, width:((idx)/questions.length*100)+'%', background:theme.accent, transition:'width .2s'}} />
      </div>
      <Card style={{textAlign:'center', padding:'28px 16px'}}>
        <div className={jpPrompt ? 'jp' : ''} style={{fontSize: fz(q.prompt, 34, 18, 7), fontWeight:700, lineHeight:1.4}}>{q.prompt}</div>
        {q.promptSub ? <div style={{fontSize:13, opacity:0.6, marginTop:6}}>{q.promptSub}</div> : null}
      </Card>
      <div style={{display:'grid', gridTemplateColumns: questions[0].choices.length > 4 ? '1fr 1fr' : '1fr', gap:8}}>
        {q.choices.map((c, i) => {
          let bg = C.cardHi;
          if (picked !== null) {
            if (c === q.answer) bg = C.ok;
            else if (c === picked) bg = C.bad;
          }
          return (
            <button key={i} onClick={() => pick(c)} style={{
              padding:'13px 10px', borderRadius:10, fontSize: fz(c, 16, 11, 9),
              fontWeight:600, background:bg, color:'#fff', transition:'background .15s',
              wordBreak:'keep-all',
            }}>{c}</button>
          );
        })}
      </div>
    </div>
  );
}

function QuizResult({ result, theme, onRetry, wrongRender }) {

// 범위별 문자 풀: basic(기본음) | daku(탁음·반탁음) | you(요음) | all
const KANA_RANGES = [
  {id:'basic', label:'기본음', rows:() => GOJUON},
  {id:'daku',  label:'탁음·반탁음', rows:() => DAKUON},
  {id:'you',   label:'요음', rows:() => YOUON},
  {id:'all',   label:'전체', rows:() => [...GOJUON, ...DAKUON, ...YOUON]},
];
function kanaPool(set, rangeId) {
  const range = KANA_RANGES.find(r => r.id === rangeId) || KANA_RANGES[3];
  const flat = range.rows().flat().filter(Boolean);
  return flat.flatMap(item => {
    const out = [];
    if (set === 'hira' || set === 'both') out.push({ch:item.h, r:item.r});
    if (set === 'kata' || set === 'both') out.push({ch:item.k, r:item.r});
    return out;
  });
}
function KanaQuizSection({ theme }) {
  const [phase, setPhase] = useState('setup');
  const [set, setSet] = useState('hira');
  const [range, setRange] = useState('basic');
  const [dir, setDir] = useState('c2r');
  const [questions, setQuestions] = useState([]);
  const [result, setResult] = useState(null);

  const start = () => {
    const pool = kanaPool(set, range);
    const picked = shuffle(pool).slice(0, 16);
    const qs = picked.map(item => {
      const others = shuffle(pool.filter(x => x.r !== item.r));
      const uniq = []; const seen = new Set();
      for (const o of others) {
        const key = dir === 'c2r' ? o.r : o.ch;
        if (!seen.has(key)) { seen.add(key); uniq.push(o); }
        if (uniq.length === 7) break;
      }
      const choices = shuffle([item, ...uniq]).map(x => dir === 'c2r' ? x.r : x.ch);
      return dir === 'c2r'
        ? { prompt:item.ch, answer:item.r, choices }
        : { prompt:item.r, answer:item.ch, choices };
    });
    setQuestions(qs);
    setPhase('play');
  };

  if (phase === 'play') return (
    <QuizRunner questions={questions} theme={theme} jpPrompt={dir==='c2r'}
      onFinish={r => { setResult(r); setPhase('done'); }} />
  );
  if (phase === 'done') return (
    <QuizResult result={result} theme={theme} onRetry={() => setPhase('setup')} />
  );
  const rangeLabel = (KANA_RANGES.find(r => r.id === range) || {}).label;
  return (
    <div className="fade-up">
      <SectionTitle theme={theme}>출제 범위</SectionTitle>
      <SubTabs theme={theme} small
        tabs={KANA_RANGES.map(r => r.label)}
        active={rangeLabel}
        onChange={t => setRange(KANA_RANGES.find(r => r.label === t).id)} />

      <SubTabs theme={theme} small
        tabs={['히라가나','가타카나','둘 다']}
        active={set==='hira'?'히라가나':set==='kata'?'가타카나':'둘 다'}
        onChange={t => setSet(t==='히라가나'?'hira':t==='가타카나'?'kata':'both')} />
      <SectionTitle theme={theme}>출제 방향</SectionTitle>
      <SubTabs theme={theme} small
        tabs={['글자 → 로마자','로마자 → 글자']}

function Flashcards({ deck, theme, showYomi, title, onExit, onMark }) {
  const [order] = useState(() => shuffle(deck));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState([]);
  const [unknown, setUnknown] = useState([]);
  const done = idx >= order.length;
  const mark = (ok) => {
    const w = order[idx];
    if (ok) setKnown(k => [...k, w]); else setUnknown(u => [...u, w]);
    if (onMark) onMark(w, ok, idx + 1 >= order.length);
    setFlipped(false);
    setIdx(i => i + 1);
  };
  if (done) return (
    <div className="fade-up">
      <Card style={{textAlign:'center', padding:'28px 16px'}}>
        <div style={{fontSize:14, opacity:0.7}}>{title} 완료!</div>
        <div style={{fontSize:30, fontWeight:900, margin:'8px 0'}}>
          <span style={{color:C.ok}}>알아 {known.length}</span>
          <span style={{opacity:0.4, margin:'0 8px'}}>/</span>
          <span style={{color:C.bad}}>모름 {unknown.length}</span>
        </div>
      </Card>
      {unknown.length > 0 && (
        <>
          <SectionTitle theme={theme}>다시 볼 단어</SectionTitle>
          {unknown.map((w, i) => (
            <Card key={i} style={{padding:'12px 14px', display:'flex', justifyContent:'space-between'}}>
              <span className="jp" style={{fontWeight:700}}>{w.jp}{showYomi && w.yomi !== w.jp ? ` (${w.yomi})` : ''}</span>
              <span style={{opacity:0.75, fontSize:14}}>{w.ko}</span>
            </Card>
          ))}
        </>
      )}
      <BigButton theme={theme} onClick={onExit}>목록으로</BigButton>
    </div>
  );
  const w = order[idx];
  return (
    <div className="fade-up">
      <div style={{display:'flex', justifyContent:'space-between', fontSize:13, opacity:0.7, marginBottom:10}}>
        <button onClick={onExit} style={{fontSize:13, opacity:0.8}}>← 나가기</button>
        <span>{idx + 1} / {order.length}</span>
      </div>
      <button onClick={() => setFlipped(f => !f)} style={{
        width:'100%', minHeight:240, borderRadius:24, padding:24,
        background: C.card,
        border: flipped ? '1.5px solid ' + theme.accent : '1px solid ' + C.line,
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8,
        transition:'background .2s',
      }}>
        {!flipped ? (
          <>
            <span className="jp" style={{fontSize:fz(w.jp,38,22,5), fontWeight:700}}>{w.jp}</span>
            {showYomi && w.yomi !== w.jp && <span className="jp" style={{fontSize:fz(w.yomi,17,13,8), opacity:0.7}}>{w.yomi}</span>}
            <Pron y={w.yomi} size={13} style={{marginTop:0}} />
            <span style={{fontSize:12, opacity:0.5, marginTop:10}}>터치해서 뜻 보기</span>
          </>
        ) : (
          <>
            <span className="jp" style={{fontSize:fz(w.jp,18,13,7), fontWeight:700, color:C.sub}}>
              {w.jp}{w.yomi !== w.jp ? ' · ' + w.yomi : ''}
            </span>
            <span style={{fontSize:fz(w.ko,25,17,8), fontWeight:800, color:theme.accent, textAlign:'center', lineHeight:1.35}}>{w.ko}</span>
          </>
        )}
      </button>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:12}}>
        <button onClick={() => mark(false)} style={{padding:'14px 0', borderRadius:14, fontSize:15, fontWeight:700, background:C.bad, color:'#fff'}}>✗ 모름</button>
        <button onClick={() => mark(true)} style={{padding:'14px 0', borderRadius:14, fontSize:15, fontWeight:700, background:C.ok, color:'#fff'}}>✓ 알아</button>
      </div>
    </div>
  );
}

  const [search, setSearch] = useState('');
  const today = useMemo(() => todaysWords(), []);
  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return WORDS;
    return WORDS.filter(w => w.jp.includes(q) || w.yomi.includes(q) || w.ko.toLowerCase().includes(q));
  }, [search]);

  const onTodayMark = (w, ok, last) => {
    const cur = loadLS('flashToday', null);
    const base = (cur && cur.date === todayStr()) ? cur : { date: todayStr(), done: 0, known: 0, wrong: [] };
    base.done = Math.min(base.done + 1, 20);
    if (ok) {
      base.known = Math.min(base.known + 1, 20);
      base.wrong = base.wrong.filter(x => x.jp !== w.jp);
    } else {
      base.wrong = [...base.wrong.filter(x => x.jp !== w.jp), {jp:w.jp, yomi:w.yomi, ko:w.ko}].slice(-10);
    }
    saveLS('flashToday', base);
    markSeen(w);
    if (last) logActivity();
  };
  const onAllMark = (w, ok, last) => { markSeen(w); if (last) logActivity(); };
  const onReviewMark = (w, ok, last) => {
    if (ok) {
      saveLS('recentWrong', loadLS('recentWrong', []).filter(x => x.jp !== w.jp));
      const fp = loadLS('flashToday', null);
      if (fp && fp.date === todayStr()) { fp.wrong = fp.wrong.filter(x => x.jp !== w.jp); saveLS('flashToday', fp); }

  if (view === 'all') return <Flashcards deck={WORDS} theme={theme} showYomi={showYomi} title="전체 단어" onExit={() => setView('list')} onMark={onAllMark} />;
  if (view === 'review') {

      <div className="fade-up">

    return <Flashcards deck={reviewDeck} theme={theme} showYomi={showYomi} title="오답 복습" onExit={() => setView('list')} onMark={onReviewMark} />;

/* =========================================================
   탭④ 단어테스트 (오늘의 20개, 4지선다, 통계 저장)
========================================================= */
function WordTestTab({ theme }) {
  const [phase, setPhase] = useState('setup');
  const [dir, setDir] = useState('j2k');  // j2k 일→한, k2j 한→일
  const [questions, setQuestions] = useState([]);
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState(() => loadLS('testHistory', []));
  const today = useMemo(() => todaysWords(), []);

  const start = () => {
    const qs = shuffle(today).map(w => {
      const others = sample(WORDS.filter(x => x.ko !== w.ko && x.jp !== w.jp), 3);
      if (dir === 'j2k') {
        return { prompt:w.jp, promptSub:w.yomi !== w.jp ? w.yomi : null,
                 answer:w.ko, choices:shuffle([w.ko, ...others.map(o => o.ko)]), w };
      }
      return { prompt:w.ko, answer:w.jp, choices:shuffle([w.jp, ...others.map(o => o.jp)]), w };
    });
    setQuestions(qs); setPhase('play');
  };
  const finish = (r) => {
    setResult(r); setPhase('done');
    const entry = { date: todayStr(), score: r.score, total: r.total,
                    rate: Math.round(r.score / r.total * 100), dir };
    const next = [entry, ...history].slice(0, 50);
    setHistory(next); saveLS('testHistory', next);
    saveLS('recentWrong', r.wrong.filter(q => q.w).map(q => q.w).slice(0, 8));
    today.forEach(markSeen);
    logActivity();
  };

  if (phase === 'play') return <QuizRunner questions={questions} theme={theme} jpPrompt={dir==='j2k'} onFinish={finish} />;
  if (phase === 'done') return <QuizResult result={result} theme={theme} onRetry={() => setPhase('setup')} />;

  return (
    <div className="fade-up">
      <Card style={{fontSize:13, lineHeight:1.6, opacity:0.8}}>
        <b style={{color:theme.accent}}>오늘의 단어 20개</b>와 같은 범위에서 4지선다 테스트를 봐요.
        결과는 자동으로 기록돼요.
      </Card>
      <SectionTitle theme={theme}>출제 방향</SectionTitle>
      <SubTabs theme={theme}
        tabs={['일본어 → 한국어','한국어 → 일본어']}
        active={dir==='j2k'?'일본어 → 한국어':'한국어 → 일본어'}
        onChange={t => setDir(t==='일본어 → 한국어'?'j2k':'k2j')} />
      <BigButton theme={theme} onClick={start}>테스트 시작</BigButton>
      <SectionTitle theme={theme}>기록 ({history.length})</SectionTitle>
      {history.length === 0 && <Card style={{textAlign:'center', fontSize:13, opacity:0.6}}>아직 기록이 없어요. 첫 테스트를 시작해 보세요!</Card>}
      {history.map((h, i) => (
        <Card key={i} style={{padding:'12px 14px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div>
            <div style={{fontSize:14, fontWeight:700}}>{h.date}</div>
            <div style={{fontSize:11, opacity:0.55}}>{h.dir === 'j2k' ? '일 → 한' : '한 → 일'}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:16, fontWeight:800, color: h.rate >= 80 ? C.ok : h.rate >= 50 ? theme.accent : C.bad}}>{h.score}/{h.total}</div>
            <div style={{fontSize:11, opacity:0.55}}>{h.rate}%</div>
          </div>
        </Card>
      ))}
    </div>
  );
}

/* 그룹화 → 그룹 내 랜덤 출제 (일→한 4지선다) */
function makeGroupedQuiz(groups, dir) {
  return groups.flatMap(g => {
    const qs = shuffle(g.items).slice(0, Math.min(g.items.length, 6));
    return qs.map(item => {
      const others = sample(g.items.filter(x => x.jp !== item.jp && x.n !== item.n), 3);
      if (dir === 'k2j') {
        return { prompt:item.n, promptSub:'['+g.name+']',
                 answer:item.jp, choices:shuffle([item.jp, ...others.map(o => o.jp)]) };
      }
      return { prompt:item.jp, promptSub:'['+g.name+']',
               answer:item.n, choices:shuffle([item.n, ...others.map(o => o.n)]) };
    });
  });
}

function MiniBars({ data, theme, height, accentLast }) {
  // data: [{label, value, max?}]
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div style={{display:'flex', alignItems:'flex-end', gap:6, height: height || 70}}>
      {data.map((d, i) => (
        <div key={i} style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, height:'100%', justifyContent:'flex-end'}}>
          <span style={{fontSize:9, color:C.sub}}>{d.value}</span>
          <div style={{width:'100%', maxWidth:24, borderRadius:'3px 3px 0 0',
            height: Math.max(3, d.value / max * (height ? height - 28 : 42)) + 'px',
            background: (accentLast && i === data.length - 1) ? theme.accent : C.cardHi}} />
          <span style={{fontSize:8.5, color:C.sub}}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}
function RecordsTab({ theme }) {
  const history = loadLS('testHistory', []);
  const activity = loadLS('activity', []);
  const seen = loadLS('seenJp', []).length;
  const streak = calcStreak();
  const best = maxStreak();
  const avg = history.length ? Math.round(history.reduce((s, h) => s + h.rate, 0) / history.length) : null;
  const now = new Date();
  const monthCount = activity.filter(d => d.startsWith(now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0'))).length;
  // 주간 학습 스트립 (최근 7일)
  const week = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    week.push({ label: '일월화수목금토'[d.getDay()], on: activity.includes(fmtDate(d)), today: i === 0 });
  }
  const rateData = history.slice(0, 10).reverse().map(h => ({label: h.date.slice(5), value: h.rate}));
  const wrongData = history.slice(0, 10).reverse().map(h => ({label: h.date.slice(5), value: h.total - h.score}));

  return (
    <div className="fade-up">
      {/* 누적 통계 */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12}}>
        {[
          {label:'누적 학습일', val: activity.length + '일'},
          {label:'최고 연속 학습', val: best + '일'},
          {label:'누적 학습 단어', val: seen + '개'},
          {label:'평균 정답률', val: avg === null ? '—' : avg + '%'},
        ].map((s, i) => (
          <div key={i} style={{background:C.card, border:'1px solid ' + C.line, borderRadius:8, padding:'14px 12px'}}>
            <div style={{fontSize:19, fontWeight:900, color:theme.accent}}>{s.val}</div>
            <div style={{fontSize:10.5, color:C.sub, marginTop:3, letterSpacing:'0.05em'}}>{s.label}</div>
          </div>
        ))}
      </div>
      {/* 주간 학습 */}
      <Card>
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
          <span style={{fontSize:13, fontWeight:800}}>주간 학습</span>
          <span style={{fontSize:10.5, color:C.sub}}>이번 달 {monthCount}일 · 현재 연속 {streak}일</span>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:6}}>
          {week.map((d, i) => (
            <div key={i} style={{textAlign:'center'}}>
              <div style={{height:30, borderRadius:6,
                background: d.on ? theme.accent : C.panel,
                border: d.today ? '1.5px solid ' + (theme.accent2 || theme.accent) : '1px solid ' + C.line,
                opacity: d.on ? 1 : 0.8}} />
              <div style={{fontSize:9, color: d.today ? theme.accent : C.sub, marginTop:4, fontWeight: d.today ? 800 : 400}}>{d.label}</div>
            </div>
          ))}
        </div>
      </Card>
      {/* 정답률 추이 */}
      {rateData.length >= 2 ? (
        <Card>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>
            <span style={{fontSize:13, fontWeight:800}}>정답률 추이</span>
            <span style={{fontSize:10.5, color:C.sub}}>최근 {rateData.length}회 (%)</span>
          </div>
          <MiniBars data={rateData} theme={theme} accentLast />
        </Card>
      ) : (
        <Card style={{fontSize:12.5, color:C.sub, lineHeight:1.6}}>테스트를 2회 이상 보면 정답률·오답 추이 그래프가 표시돼요.</Card>
      )}

        <Card>
          <div style={{display:'flex', justifyContent:'space-between', marginBottom:10}}>

          </div>
          <MiniBars data={wrongData} theme={theme} accentLast />
        </Card>
      )}
    </div>
  );

  const streak = calcStreak();
  const seen = loadLS('seenJp', []).length;
  const activity = loadLS('activity', []);
  const best = maxStreak();
  const avg = history.length ? Math.round(history.reduce((s, h) => s + h.rate, 0) / history.length) : null;
  const dateLabel = (() => { const d = new Date(); return (d.getMonth()+1) + '월 ' + d.getDate() + '일'; })();

  const Idx = ({ n }) => <span style={{fontSize:10, color:C.sub, letterSpacing:'0.15em', fontWeight:700}}>{n}</span>;
  const JpT = ({ children }) => <span className="jp" style={{fontSize:11, color:theme.accent2 || theme.accent, fontWeight:700, letterSpacing:'0.04em'}}>{children}</span>;

  return (
    <div className="fade-up">
      {/* ── 상단 정보 영역: 날짜 · 연속 · 오늘 진행률(도넛) · 누적 ── */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', margin:'6px 0 18px'}}>
        <div>
          <div className="jp" style={{fontSize:12, color:theme.accent2 || theme.accent, fontWeight:700}}>今日の日本語</div>
          <div style={{fontSize:22, fontWeight:900, letterSpacing:'-0.5px', margin:'3px 0 6px'}}>{dateLabel}</div>
          <div style={{fontSize:11.5, color:C.sub, lineHeight:1.7}}>
            연속 학습 <b style={{color:C.text}}>{streak}일</b><br/>
            누적 단어 <b style={{color:C.text}}>{seen}개</b>
          </div>
        </div>
        <div style={{textAlign:'center'}}>
          <Donut pct={prog / 20} size={76} theme={theme} />
          <div style={{fontSize:9.5, color:C.sub, marginTop:4, letterSpacing:'0.08em'}}>오늘 진행률</div>
        </div>
      </div>

      {/* ── 1단계 · 메인: 今日の単語 ── */}
      <div onClick={() => onGo('vocab', 'today')} style={{
        background:C.card, border:'1px solid ' + C.line, borderRadius:24,
        padding:'22px 20px', marginBottom:12, cursor:'pointer',
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <Idx n="01" /><JpT>今日の単語</JpT>
        </div>
        <div style={{fontSize:19, fontWeight:800, margin:'8px 0 2px'}}>오늘의 단어 20</div>
        <div style={{fontSize:12.5, color:C.sub}}>
          {prog >= 20 ? '20개 전부 완료! 복습도 가능해요' : prog > 0 ? `20개 중 ${prog}개 완료 · 남은 단어 ${remain}개` : '날짜 기반으로 자동 분배된 단어'}
        </div>
        <div style={{height:6, borderRadius:3, background:C.panel, marginTop:14}}>
          <div style={{height:6, borderRadius:3, width:(prog/20*100)+'%', background:theme.accent, transition:'width .3s'}} />
        </div>
        <div style={{marginTop:14, padding:'12px 0', borderRadius:10, background:theme.accent, color:'#fff',
          textAlign:'center', fontSize:14.5, fontWeight:800}}>
          {prog >= 20 ? '다시 학습하기' : prog > 0 ? '학습 계속하기' : '학습 시작'}
        </div>
      </div>

      {/* ── 2단계 · 보조: 今日のテスト ── */}
      <div onClick={() => onGo('vocab', 'test')} style={{
        background:C.card, border:'1px solid ' + C.line, borderRadius:14,
        padding:'15px 18px', marginBottom:10, cursor:'pointer',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <div>
          <div style={{display:'flex', gap:8, alignItems:'center'}}><Idx n="02" /><JpT>今日のテスト</JpT></div>
          <div style={{fontSize:15, fontWeight:800, marginTop:4}}>단어 테스트</div>
          <div style={{fontSize:11.5, color:C.sub, marginTop:2}}>
            {last ? `최근 ${last.score} / ${last.total} · 정답률 ${last.rate}% · ${last.date.slice(5)} 응시` : '오늘의 단어 20개 범위로 점검'}
          </div>
        </div>
        <span style={{fontSize:17, color: last && last.date === todayStr() ? C.ok : theme.accent, fontWeight:800, flexShrink:0, marginLeft:10}}>
          {last && last.date === todayStr() ? '✓' : '→'}
        </span>
      </div>

      {/* ── 2단계 · 보조: 復習 (행동 유도) ── */}
      <div style={{
        background:C.card, border:'1px solid ' + C.line, borderRadius:14,
        padding:'15px 18px', marginBottom:10,
      }}>
        <div style={{display:'flex', gap:8, alignItems:'center'}}><Idx n="03" /><JpT>復習</JpT></div>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:4}}>
          <div>
            <div style={{fontSize:15, fontWeight:800}}>오답 복습</div>
            <div style={{fontSize:11.5, color:C.sub, marginTop:2}}>
              {reviewDeck.length > 0 ? `복습 필요 단어 ${reviewDeck.length}개` : '틀린 단어가 여기에 모여요'}
            </div>
          </div>
          {reviewDeck.length > 0 && (
            <button onClick={() => onGo('vocab', 'review')} style={{
              padding:'9px 14px', borderRadius:8, background:C.cardHi, border:'1px solid ' + C.line,
              color:C.text, fontSize:12.5, fontWeight:700, flexShrink:0, marginLeft:10,
            }}>복습 시작</button>
          )}
        </div>
        {reviewDeck.length > 0 && (
          <div style={{display:'flex', gap:6, flexWrap:'wrap', marginTop:10}}>
            {reviewDeck.slice(0, 5).map((w, i) => (
              <span key={i} className="jp" style={{fontSize:12.5, fontWeight:700, background:C.panel,
                border:'1px solid ' + C.line, borderRadius:6, padding:'4px 9px'}}>{w.jp}</span>
            ))}
            {reviewDeck.length > 5 && <span style={{fontSize:11, color:C.sub, alignSelf:'center'}}>+{reviewDeck.length - 5}</span>}
          </div>
        )}
      </div>

      {/* ── 3단계 · 정보: 学習記録 ── */}
      <div onClick={() => onGo('learn')} style={{
        background:C.panel, border:'1px solid ' + C.line, borderRadius:8,
        padding:'13px 16px', cursor:'pointer',
      }}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
          <div style={{display:'flex', gap:8, alignItems:'center'}}><Idx n="04" /><JpT>学習記録</JpT></div>
          <span style={{fontSize:11, color:C.sub}}>자세히 →</span>
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:4}}>
          {[
            {l:'누적일', v: activity.length},
            {l:'최고 연속', v: best},
            {l:'단어', v: seen},
            {l:'정답률', v: avg === null ? '—' : avg + '%'},
          ].map((s, i) => (
            <div key={i} style={{textAlign:'center'}}>
              <div style={{fontSize:14.5, fontWeight:900, color:theme.accent}}>{s.v}</div>
              <div style={{fontSize:9, color:C.sub, marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   설정 바텀시트
========================================================= */
function SettingsSheet({ theme, themeIdx, setThemeIdx, showYomi, setShowYomi, darkMode, onClose }) {
  const resetStats = () => {
    if (window.confirm('테스트 기록을 모두 삭제할까요?')) {
      removeLS('testHistory');
      window.location.reload();
    }
  };
  return (
    <div onClick={onClose} style={{position:'fixed', inset:0, background: darkMode ? 'rgba(0,0,0,0.55)' : 'rgba(0,0,0,0.3)', zIndex:50, display:'flex', alignItems:'flex-end', justifyContent:'center'}}>
      <div onClick={e => e.stopPropagation()} style={{
        width:'100%', maxWidth:480, background:C.panel, borderRadius:'22px 22px 0 0',
        padding:'20px 20px calc(24px + env(safe-area-inset-bottom))', animation:'sheetUp .25s ease',
      }}>
        <div style={{width:40, height:4, borderRadius:2, background:C.line, margin:'0 auto 18px'}} />
        <div style={{fontSize:17, fontWeight:800, marginBottom:16}}>설정</div>
        <div style={{fontSize:13, fontWeight:700, opacity:0.7, marginBottom:8}}>테마 색상</div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:20}}>
          {THEMES.map((t, i) => (
            <button key={i} onClick={() => setThemeIdx(i)} style={{
              padding:'10px 6px', borderRadius:12, fontSize:12, fontWeight:700,
              background:C.card,
              border: themeIdx === i ? `2px solid ${t.accent}` : '2px solid transparent',
              display:'flex', flexDirection:'column', alignItems:'center', gap:6,
            }}>
              <span style={{width:22, height:22, borderRadius:'50%', background:t.accent, display:'inline-block'}} />
              {t.name}
            </button>
          ))}
        </div>
        <button onClick={() => setShowYomi(v => !v)} style={{
          width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center',
          padding:'14px 16px', borderRadius:14, background:C.card, marginBottom:10,
        }}>
          <span style={{fontSize:14, fontWeight:700}}>읽기(요미가나) 표시</span>
          <span style={{
            width:46, height:26, borderRadius:13, background: showYomi ? theme.accent : C.cardHi,
            position:'relative', transition:'background .2s', display:'inline-block',
          }}>
            <span style={{position:'absolute', top:3, left: showYomi ? 23 : 3, width:20, height:20, borderRadius:'50%', background:'#fff', transition:'left .2s'}} />
          </span>
        </button>
        <button onClick={resetStats} style={{
          width:'100%', padding:'14px 16px', borderRadius:14, background:'rgba(239,68,68,0.12)',
          color:'#F87171', fontSize:14, fontWeight:700, textAlign:'left',
        }}>테스트 통계 초기화</button>
        <div style={{textAlign:'center', fontSize:11, opacity:0.4, marginTop:18}}>made by 21209 김예성</div>
      </div>
    </div>
  );
}

/* =========================================================
   App
========================================================= */
const NAV = [
  {id:'home', icon:'home', label:'홈'},
  {id:'kana', icon:'kana', label:'오십음도'},
  {id:'vocab', icon:'book', label:'단어장'},
  {id:'expr', icon:'chat', label:'표현'},
  {id:'learn', icon:'ruler', label:'학습'},
];
function App() {
  const [tab, setTab] = useState('home');
  const [intent, setIntent] = useState(null);
  const go = (t, i) => { setIntent(i || null); setTab(t); };
  const [themeIdx, setThemeIdxRaw] = useState(() => loadLS('themeIdx', 0));
  const [showYomi, setShowYomiRaw] = useState(() => loadLS('showYomi', true));
  const [showPron, setShowPronRaw] = useState(() => loadLS('showPron', false));
  const [darkMode, setDarkModeRaw] = useState(() => loadLS('darkMode', true));
  const [settingsOpen, setSettingsOpen] = useState(false);
  const theme = THEMES[themeIdx] || THEMES[0];
  const setThemeIdx = (i) => { setThemeIdxRaw(i); saveLS('themeIdx', i); };
  const setShowYomi = (fn) => setShowYomiRaw(v => { const next = typeof fn === 'function' ? fn(v) : fn; saveLS('showYomi', next); return next; });
  const togglePron = () => setShowPronRaw(v => { saveLS('showPron', !v); return !v; });
  const toggleDark = () => setDarkModeRaw(v => { saveLS('darkMode', !v); return !v; });

  // C를 렌더 전에 동기적으로 교체 — 모든 자식이 올바른 팔레트를 봄
  Object.assign(C, darkMode ? DARK_C : LIGHT_C);

  useEffect(() => {
    document.body.classList.toggle('light', !darkMode);
    const meta = document.querySelector('meta[name=theme-color]');
    if (meta) meta.setAttribute('content', C.bg);
  }, [darkMode, themeIdx]);

  return (
    <PronCtx.Provider value={showPron}>
    <div className="bp-grid" style={{maxWidth:480, margin:'0 auto', minHeight:'100%', display:'flex', flexDirection:'column'}}>
      {/* 헤더 */}
      <header style={{
        position:'sticky', top:0, zIndex:30, background: darkMode ? 'rgba(15,23,42,0.92)' : 'rgba(245,247,250,0.95)', backdropFilter:'blur(6px)',
        padding:'calc(12px + env(safe-area-inset-top)) 18px 12px',
        display:'flex', justifyContent:'space-between', alignItems:'center',
        borderBottom:'1px solid ' + C.line,
      }}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <span className="jp" style={{
            width:32, height:32, borderRadius:8, border:'1.5px solid '+theme.accent, color:theme.accent,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, fontWeight:700,
          }}>日</span>
          <div>
            <div style={{fontSize:16, fontWeight:900, letterSpacing:'-0.3px', lineHeight:1.1}}>일본어 학습</div>
            <div style={{fontSize:8.5, color:C.sub, letterSpacing:'0.18em', marginTop:2}}>STUDY NOTE</div>
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          <button onClick={togglePron} title="로마자 발음 표시" style={{
            fontSize:12, fontWeight:800, padding:'5px 9px', borderRadius:8,
            background: showPron ? theme.accent : C.cardHi,
            color: showPron ? '#fff' : C.sub,
            border:'1px solid ' + C.line, transition:'background .15s',
          }}>Aa</button>
          <button onClick={toggleDark} title={darkMode ? '라이트 모드' : '다크 모드'} style={{padding:4, color:C.sub, display:'flex'}}>
            <Ic d={ICONS[darkMode ? 'sun' : 'moon']} size={19} />
          </button>
          <button onClick={() => setSettingsOpen(true)} style={{padding:4, color:C.sub, display:'flex'}}><Ic d={ICONS.gear} size={19} /></button>
        </div>
      </header>

      {/* 본문 */}
      <main style={{flex:1, padding:'16px 16px calc(86px + env(safe-area-inset-bottom))'}}>
        {tab === 'home' && <HomeTab theme={theme} onGo={go} />}
        {tab === 'kana' && <KanaTab theme={theme} />}
        {tab === 'vocab' && <VocabTab theme={theme} showYomi={showYomi} intent={intent} />}
        {tab === 'expr' && <ExpressionTab theme={theme} />}
        {tab === 'learn' && <LearnHub theme={theme} initial={intent} />}
      </main>

      {/* 하단 탭 */}
      <nav style={{
        position:'fixed', bottom:0, left:0, right:0, zIndex:40,
        display:'flex', justifyContent:'center',
      }}>
        <div style={{
          width:'100%', maxWidth:480, display:'grid', gridTemplateColumns:'repeat(5,1fr)',
          background:C.bg, borderTop:'1px solid ' + C.line,
          padding:'8px 4px calc(8px + env(safe-area-inset-bottom))',
        }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => { setIntent(null); setTab(n.id); }} style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'4px 0',
              color: tab === n.id ? theme.accent : C.sub,
            }}>
              {n.icon === 'kana'
                ? <span className="jp" style={{fontSize:17, fontWeight:700, lineHeight:'20px', height:20}}>あ</span>
                : <Ic d={ICONS[n.icon]} size={19} />}
              <span style={{fontSize:9.5, fontWeight: tab === n.id ? 800 : 500}}>{n.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {settingsOpen && (
        <SettingsSheet theme={theme} themeIdx={themeIdx} setThemeIdx={setThemeIdx}
          showYomi={showYomi} setShowYomi={setShowYomi} darkMode={darkMode}
          onClose={() => setSettingsOpen(false)} />
      )}
    </div>
    </PronCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
